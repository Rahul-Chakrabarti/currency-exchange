# ── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# ── PostgreSQL ───────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/currency_exchange_db}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ── External rate API ─────────────────────────────────────────────────────────
exchange.api.base-url=${EXCHANGE_API_URL:https://open.er-api.com/v6/latest}
exchange.api.default-base=${EXCHANGE_API_DEFAULT_BASE:USD}

# ── JSON export ───────────────────────────────────────────────────────────────
exchange.json.export-dir=${EXPORT_DIR:./data/exports}

# ── Scheduler ─────────────────────────────────────────────────────────────────
exchange.rate.refresh.cron=${REFRESH_CRON:0 0 */6 * * *}